# Codecov Configuration

# Coverage thresholds
coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 2%
    patch:
      default:
        target: 50%

# Ignore patterns — exclude files that require instrumented tests (UI)
ignore:
  # Test sources (not production code)
  - "app/src/androidTest/**"
  - "app/src/test/**"

  # Generated code
  - "**/R.java"
  - "**/BuildConfig.java"
  - "**/*MapperImpl*.kt"

  # Test files
  - "**/*Test*.kt"

  # DI modules (Hilt boilerplate)
  - "**/*Module.kt"
  - "**/di/**"

  # Presentation layer — Compose UI (requires instrumented tests, not run in CI)
  - "**/presentation/**/*Screen.kt"
  - "**/presentation/**/*Content.kt"
  - "**/presentation/**/*Dialog.kt"
  - "**/presentation/**/components/**"
  - "**/presentation/splash/**"
  - "**/presentation/utils/**"

# Comment configuration
comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false
